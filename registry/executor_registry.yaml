- id: executor-codex
  name: Codex Subprocess Executor
  type: executor
  status: active
  purpose: 通过 managed subprocess 运行 Codex CLI exec（one-shot 模式）
  executor_registry_name: codex
  execution_model: managed_subprocess
  module_path: WorkflowBase/runner/codex/executor.py
  entry_class: CodexExecutor
  applicable_lanes:
  - A_LINE_FORMAL
  - B_LINE_LIGHTWEIGHT_DAG
  - WORKYB_RUNTIME
  - DOGFOOD_TEST
  inputs:
  - task_config with prompt_file or prompt
  outputs:
  - RunResult with JSONL stdout
  - stderr
  - classification
  allowed_paths:
  - ~/项目开发/**
  forbidden_paths: []
  tools_required:
  - codex
  permission_level: write_within_scope
  risk_level: medium
  owner_approval_required: false
  validation:
  - exit_code 0
  - JSONL valid
  - expected outputs present
  return_format: RunResult (JSONL stdout)
  evidence_paths:
  - task_dir/runtime/result.json
  - task_dir/logs/stdout.log
  - task_dir/logs/raw_output.jsonl
  env_required:
  - HTTPS_PROXY (for sandbox connectivity)
- id: executor-fallback-subprocess
  name: Generic Subprocess Executor
  type: executor
  status: active
  purpose: 未注册 executor 类型的通用 subprocess 兜底
  executor_registry_name: fallback-subprocess
  execution_model: managed_subprocess
  module_path: WorkflowBase/runner/relay_runner.py
  entry_class: (inline — no dedicated class, handled in relay_runner managed_subprocess
    branch)
  applicable_lanes:
  - ALL
  inputs:
  - task_config
  - command
  outputs:
  - RunResult
  allowed_paths:
  - ~/项目开发/**
  forbidden_paths:
  - /etc/**
  - ~/.ssh/**
  - ~/Library/**
  tools_required:
  - command specified in config
  permission_level: full
  risk_level: high
  owner_approval_required: true
  validation:
  - exit_code 0
  - expected outputs present
  return_format: RunResult
  evidence_paths:
  - task_dir/runtime/result.json
  - task_dir/logs/stdout.log
- id: resolver-path-resolver
  name: Path Resolver
  type: resolver
  status: active
  purpose: PM Runtime 路径防漂移模块 — 从单一 project_root 基址派生所有路径，校验存在性，生成缺失报告
  module_path: WorkflowBase/runner/path_resolver.py
  entry_class: ProjectPaths
  applicable_lanes:
  - ALL
  inputs:
  - project_root (default: auto-detect)
  outputs:
  - path resolution
  - existence check
  - missing report
  allowed_paths:
  - ~/项目开发/**
  - ~/.hermes/**
  - ~/Downloads/**
  forbidden_paths: []
  tools_required:
  - python3
  permission_level: readonly
  risk_level: low
  owner_approval_required: false
  validation:
  - exit code 0
  - paths resolved correctly
  features:
  - single_root_derivation: true
  - existence_validation: true
  - migration_ready: true
  - missing_report_generation: true
- id: plugin-deepseek-thinking-fixer
