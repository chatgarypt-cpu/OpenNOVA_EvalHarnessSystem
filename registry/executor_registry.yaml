- id: executor-codex-tmux
  name: Codex Tmux Executor
  type: executor
  status: active
  purpose: 通过 tmux 交互式运行 Codex CLI，支持 /plan→/execute 两阶段模式 + Terminal observer window
  executor_registry_name: codex-tmux
  execution_model: tmux_interactive
  module_path: WorkflowBase/runner/codex/tmux_executor.py
  entry_class: CodexTmuxExecutor
  applicable_lanes:
  - A_LINE_FORMAL
  - WORKYB_RUNTIME
  - DOGFOOD_TEST
  inputs:
  - task_config with prompt
  - executor_options.codex_context
  outputs:
  - RunResult with classification
  - pane_capture
  - receipt
  - codex_handoff.md
  allowed_paths:
  - ~/项目开发/**
  forbidden_paths:
  - ~/.hermes/**
  - ~/.cc-switch/**
  tools_required:
  - codex
  - tmux
  permission_level: write_within_scope
  risk_level: medium
  owner_approval_required: false
  validation:
  - exit_code 0|5
  - expected outputs present|missing
  - codex_receipt.yaml present
  - completion_markers detected
  return_format: RunResult
  evidence_paths:
  - task_dir/runtime/result.json
  - task_dir/logs/pane_capture.log
  - task_dir/receipts/codex_receipt.yaml
  - task_dir/codex/codex_handoff.md
  - task_dir/runtime/result.yaml
  features:
  - observer_mode: true
  - observer_attach: terminal_window
  - two_phase_plan_execute: true
  - codex_approver_daemon: true
  - structured_blocker_classification: true
  - completion_marker_detection: '[codex-agent: Session complete, Token usage regex]'
  - dynamic_idle_timeout: true
  - profile_aware_sound: true
  - self_eat_verified: true
  env_required:
  - CODEX_AUTH (handled by codex login)
  - HTTPS_PROXY (for sandbox connectivity)
