# ── Gate Scripts（手动调用，"skill 写规则，script 做门"）────

- id: script-handoff-writer
  name: Handoff Writer
  type: gate_script
  status: active
  version: '0.1'
  purpose: 写 .session_handoff.md 时的 record_protocol gate — 校验 stdin 中 record_protocol 存在性 + 枚举合法性，自动执行读旧→存档→合并→写新→时间戳全流程
  script_type: pipe_gate
  script_path: /Users/gary/.hermes/scripts/handoff-writer.py
  auto_accept: false
  call_pattern: 'cat content | python3 handoff-writer.py [--handoff-path PATH] [--replace]'
  applicable_lanes: [ALL]
  inputs: [stdin handoff content with record_protocol]
  outputs: [.session_handoff.md, archive copy, update summary YAML]
  allowed_paths: ["~/项目开发/**/.session_handoff.md", "~/项目开发/AdarianMigration/adarian mvp/WorkflowBase/memory/handoffs/"]
  forbidden_paths: []
  tools_required: [python3, pyyaml]
  permission_level: write_within_scope
  risk_level: medium
  owner_approval_required: false
  validation: [exit code 0, protocol_status ok, handoff file written]
  depends_on: [script-session-end-stamp]
  features:
    - record_protocol_gate: true
    - auto_archive: true
    - auto_merge: true
    - auto_timestamp: true

