  hook_type: python_script
  trigger: pre_llm_call
  hook_path: /Users/gary/.hermes/scripts/dispatch-approval-gate.py
  auto_accept: false
  timeout_sec: 10
  applicable_lanes: [A_LINE_FORMAL, WORKYB_RUNTIME]
  inputs: [user message containing dispatch intent]
  outputs: [approval request signal]
  allowed_paths: []
  forbidden_paths: []
  tools_required: [python3]
  permission_level: readonly
  risk_level: low
  owner_approval_required: true
  validation: [exit code 0, status awaiting_approval]
  features:
    - dispatch_intent_detection: true
    - owner_approval_required: true
