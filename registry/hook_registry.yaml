# Hook Registry R0.2
# Adarian 系统已注册 hook + gate script 清单。
# 分类说明：
#   type: hook        — 通过 hermes config.yaml hooks.pre_llm_call 自动触发
#   type: gate_script — "skill 写规则，script 做门"模式的手动调用脚本
#   type: utility     — 被 gate_script 调用的辅助工具

# ── Hermes Config Hooks（自动触发）───────────────────────────

- id: hook-iteration-gate
  name: Iteration Plan Gate
  type: hook
  status: active
  version: '0.1'
  purpose: 自动扫描 ~/Downloads/ 新迭代计划文件 → 落盘到 docs/iterations/ → 审查计划结构/冲突 → 报告 readiness
  hook_type: python_script
  trigger: pre_llm_call
  hook_path: /Users/gary/.hermes/scripts/iteration-gate.py
  auto_accept: true
  timeout_sec: 15
  applicable_lanes: [A_LINE_FORMAL, WORKYB_RUNTIME]
  inputs: [Downloads/ 新文件]
  outputs: [gate result with recommended_next_skill]
  allowed_paths: ["~/项目开发/**", "~/Downloads/**", "~/.hermes/scripts/**"]
  forbidden_paths: []
  tools_required: [python3]
  permission_level: readonly
  risk_level: low
  owner_approval_required: false
  validation: [exit code 0, result structured]
  features:
    - auto_scan_downloads: true
    - auto_land_plans: true
    - conflict_detection: true
    - next_skill_routing: true

- id: hook-dispatch-approval-gate
