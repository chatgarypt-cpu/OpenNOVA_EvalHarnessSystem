- id: mcp-brave
  name: Brave Search
  type: mcp
  status: active
  purpose: 本地搜索和网页搜索（Brave Search API）
  transport: stdio
  command: python3 /Users/gary/.hermes/brave-search-mcp.py
  server_name: brave
  tools_provided:
  - brave_web_search
  - brave_local_search
  applicable_lanes:
  - B_LINE_LIGHTWEIGHT_DAG
  - COURSEWORK
  - WORKYB_RUNTIME
  inputs:
  - search query
  outputs:
  - search results
  allowed_paths: []
  forbidden_paths: []
  tools_required:
  - python3
  permission_level: readonly
  risk_level: medium
  owner_approval_required: false
  validation:
  - results returned
  return_format: JSON
  evidence_paths: []
  env_required:
  - BRAVE_API_KEY
  - HTTP_PROXY
