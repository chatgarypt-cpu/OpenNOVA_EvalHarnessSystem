principles:
  - "Global memory must stay clean."
  - "Scope memory isolates project and workflow contexts."
  - "Handoff is a cross-session continuity layer, not long-term memory."
  - "Search provides evidence, not authority."
  - "External plugins may remain external, but must be registered."

write_permissions:
  allowed:
    - "owner"
    - "hermes"
  denied_by_default:
    - "ds_team"
    - "codex"
    - "claude_code"
    - "external_agents"
  hermes_operation_tiers:
    routine:
      description: "May execute autonomously"
      actions:
        - "Update session handoff"
        - "Record memory audit results"
        - "Update registry TO_BE_FILLED fields when path confirmed"
        - "Update last_updated timestamps"
    restricted:
      description: "Requires Owner confirmation"
      actions:
        - "Add or modify scope definitions"
        - "Modify external module registrations"
        - "Execute scope promotion (B to A)"
        - "Execute scope archiving"
    forbidden:
      description: "Absolute prohibition"
      actions:
        - "Modify write_permissions field"
        - "Modify conflict_resolution_order"
        - "Modify principles"
        - "Modify contamination_policy_definitions"

contamination_policy_definitions:
  strict:
    description: "Strict isolation"
    write: "Only by Owner direct instruction or Hermes within scope context"
    read: "Default: no cross-scope reads (except Global Memory)"
    cross_scope_write: "Forbidden"
    written_by_other_scopes: "Forbidden (explicit whitelist excepted)"
    applies_to:
      - "adarian/main_governance"
      - "adarian/memory_governance"
  controlled:
    description: "Controlled access"
    write: "Hermes may write within task context; record operations in handoff"
    read: "May read related scopes (declare borrowing purpose in handoff)"
    cross_scope_write: "Requires Owner confirmation"
    applies_to:
      - "workflow/hermes_pm_runtime"
  isolated:
    description: "Full isolation"
    write: "Current scope context only. Writing to any other scope forbidden."
    read: "Global Memory + current scope only. Reading other scope memory forbidden."
    cross_scope_write: "Forbidden (includes Adarian, workflow, workyb, and all other scopes)"
    applies_to:
      - "ai_creative_publishing/coursework"
      - "toolchain/local_environment"
      - "coursework/general"

memory_layers:
  - layer_id: "L0_runtime_context"
    layer_name: "Runtime Context"
    purpose: "Current conversation context."
    storage_location: "active session"
    authority_level: 90
    lifecycle: "ephemeral"

  - layer_id: "L1_session_handoff"
    layer_name: "Session Handoff"
    purpose: "Cross-session continuity, context handoff, and historical timeline archive."
    storage_location: 'WorkflowBase/memory/handoff/.session_handoff.md (current state) + handoffs.db (SQLite history)'
    authority_level: 80
    lifecycle: "continuity"
    read_trigger: "new session or explicit handoff load (auto-loaded via pre_llm_call hook)"
    write_trigger: "session closeout or explicit owner/hermes update (via handoff-writer.py, auto-archives old version)"
    freshness_decay_days: 7
    freshness_decay_penalty: 10

  - layer_id: "L2_scope_memory"
    layer_name: "Scope Memory"
    purpose: "Project/workflow partition recall storage."
    storage_location: "native memory or external configured provider"
    registry_location: "WorkflowBase/memory/memory_registry.yaml"
    authority_level: 70
    lifecycle: "scope-bound"
    degradation_strategy: |
      When scope_recall_provider is unavailable:
      1. Fall back to Global Memory (L3) for user preferences and general facts.
      2. Fall back to Session Handoff (L1) for current task continuity.
      3. Scope-specific memories are not retrievable until provider is restored.
      4. Log degradation event in audits/ with timestamp and reason.
      5. If degradation persists > 3 sessions, prompt Owner to investigate.

  - layer_id: "L3_global_memory"
    layer_name: "Global Memory"
    purpose: "Stable user preferences and long-term general facts."
    storage_location: "native memory"
    authority_level: 60
    lifecycle: "long-term"

  - layer_id: "L4_session_search"
    layer_name: "Session Search / Historical Recall"
    purpose: "Historical evidence retrieval — fast mode (FTS5, 0 LLM token) 优先，summary/guided 仅深度理解时使用。"
    storage_location: "native session search or external recall index"
    authority_level: 40
    lifecycle: "historical"
    features:
      - "fast — 纯 FTS5 查询，零 LLM 成本，适用闪电召回"
      - "summary — auxiliary LLM 总结匹配会话"
      - "guided — multi-anchor 钻取 + bookends（起止边界）+ match_message_id 精确定位"
    config_path: "auxiliary.session_search.default_mode"
    default_mode: "fast"
    retrieval_protocol: "详见 retrieval_protocol.yaml priority 2 (fast) / priority 4 (summary/guided)"

  - layer_id: "L5_external_plugins"
    layer_name: "External Native Plugins"
    purpose: "Native or external memory plugins that cannot be moved into workyb."
    storage_location: "external"
    authority_level: 30
    lifecycle: "external"

conflict_resolution_order:
  - "current_owner_instruction"
  - "current_session_confirmed_context"
  - "session_handoff"
  - "formal_dispatch_receipt_report"
  - "scope_memory"
  - "global_memory"
  - "session_search_evidence"
  - "model_impression"
on_insufficient_evidence: "hold_and_escalate"

