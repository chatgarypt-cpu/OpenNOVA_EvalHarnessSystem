external_modules:
  - module_id: "scope_recall_provider"
    module_type: "scoped_recall_storage_backend"
    runtime_status: "active"
    maintenance_status: "stable"
    actual_capability: "SQLite + FTS5 storage/retrieval backend; 333 memories captured; on-demand retrieval"
    routing_capability: false
    fallback_module: "native_memory"
    source_location: "~/.hermes/plugins/scope-recall/"
    config_location: "~/.hermes/config.yaml -> memory.provider: scope-recall"
    config_actual_mismatch: false
    actual_provider: "scope-recall (local, active)"
    configured_provider: "scope-recall"
    storage_location: "~/.hermes/scope-recall/ (memory.sqlite3 + lancedb)"
    purpose: "On-demand memory retrieval via SQLite + FTS5. Activated and verified 2026-06-03."
    notes: "Active. Hermes memory status confirms: installed ✓, available ✓, active ←."
    last_verified: "2026-06-03"
    last_verified_method: "hermes memory status + SQLite inspection"

  - module_id: "native_memory"
    module_type: "native_memory"
    status: "active"
    source_location: "native/system"
    config_location: "built-in, no explicit config path"
    purpose: "Stable global memory (fallback for scope-recall provider)."
    last_verified: "2026-05-25"

  - module_id: "session_search"
    module_type: "historical_search"
    status: "active"
    source_location: "native/system"
    config_location: "auxiliary.session_search (built-in)"
    purpose: "Historical evidence retrieval — default_mode: fast (FTS5, 0 LLM token)."
    features:
      - "fast: zero-LLM FTS5 recall"
      - "summary: auxiliary LLM summarization"
      - "guided: multi-anchor drill-down with bookends + match_message_id"
    retrieval_protocol: "retrieval_protocol.yaml — priority 2 (fast) / priority 4 (summary/guided)"
    last_verified: "2026-05-29"

  - module_id: "huihua_handoff_skill"
    module_type: "skill"
    runtime_status: "active"
    maintenance_status: "stable"
    source_location: "~/.hermes/skills/session-handoff/huihua-handoff/SKILL.md"
    config_location: "~/.hermes/config.yaml -> skills.external_dirs (currently empty)"
    purpose: "Cross-session context handoff (renamed from session_handoff_skill)."
    notes: "active means skill definition is available, NOT that new sessions auto-trigger. Auto-trigger still depends on prefill/plugin/hook."
    last_verified: "2026-05-25"

  - module_id: "prefill_messages_file"
    module_type: "config_setting"
    status: "inactive"
    source_location: "~/.hermes/config.yaml"
    config_location: "prefill_messages_file: '' (currently empty)"
    purpose: "Potential hook for auto-handoff-check at session start."
    notes: "Currently empty. If enabled, could auto-trigger handoff file search. Requires testing."
    last_verified: "2026-05-25"

  - module_id: "handoff_loader_hook"
    module_type: "shell_hook"
    runtime_status: "active"
    maintenance_status: "stable"
    source_location: "~/.hermes/scripts/handoff-loader.py"
    config_location: "~/.hermes/config.yaml -> hooks.pre_llm_call"
    purpose: "Auto-load .session_handoff.md at new session start. Registered as pre_llm_call hook."
    notes: "Fires on first LLM call of each session. Searches PWD + 3 parent dirs for .session_handoff.md, injects content as first user message context."
    last_verified: "2026-05-26"

  - module_id: "handoff_writer_script"
    module_type: "shell_script"
    runtime_status: "active"
    maintenance_status: "stable"
    source_location: "~/.hermes/scripts/handoff-writer.py"
    purpose: "Write .session_handoff.md with read→archive→merge→write four-step protocol. Prevents accidental overwrite."
    notes: "MANDATORY for all handoff writes. Auto-archives old version to WorkflowBase/memory/handoffs/ before merge."
    last_verified: "2026-05-26"

  - module_id: "hooks_system_pre_llm_call"
    module_type: "config_system"
    runtime_status: "active"
    maintenance_status: "stable"
    source_location: "~/.hermes/config.yaml -> hooks"
    config_location: "hooks.pre_llm_call: [handoff-loader.py]"
    purpose: "Hermes hook system. Enables pre_llm_call event trigger."
    notes: "hooks_auto_accept: true. Currently only one hook registered (handoff-loader). Can be extended with more hooks."
    last_verified: "2026-05-26"

audit:
  audit_skill_path: "WorkflowBase/memory/skills/memory_audit_skill.md"
  trigger: "prompt_triggered"
  interval: "on_demand"
  checks:
    - "scope contamination"
    - "registry/readme consistency"
    - "external module path drift"
    - "handoff freshness"
    - "cross-scope write violations"
    - "main memory pollution"
    - "agent reading scope A while exposing scope B content (read contamination)"
    - "scope-recall router decision correctness"
